<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol-X | Secure Gateway</title>
    <style>
        :root {
            --primary: #00ff88; /* Neon sports green */
            --bg: #0a0a0a;
            --card: #151515;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        .container {
            background: var(--card);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }
        .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }
        p {
            color: #888;
            margin-bottom: 2rem;
            font-style: italic;
        }
        .discord-btn {
            display: inline-block;
            background: #5865F2; /* Discord Blue */
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
        }
        .discord-btn:hover {
            transform: translateY(-3px);
            background: #4752c4;
        }
        .footer-text {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #444;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚽</div>
        <h1>Hello Stalker.</h1>
        <p>You’ve reached the Futbol-X secure gateway. Nothing to see here... unless you're one of us.</p>
        
        <a href="https://discord.gg/6Rm347EkV2" target="_blank" class="discord-btn">
            Join us on Discord
        </a>

        <div class="footer-text">
            Proprietary Infrastructure // Optimus Admin
        </div>
    </div>
</body>
</html>
